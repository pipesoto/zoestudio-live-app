<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoe Studio | Reserva en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-100 text-zinc-900">
    <main class="mx-auto max-w-6xl p-4 sm:p-6">
      <header class="mb-6 rounded-2xl bg-white p-5 shadow-sm">
        <h1 class="text-2xl font-bold sm:text-3xl">Zoe Studio - Reservas en Vivo</h1>
        <p class="mt-2 text-sm text-zinc-600">
          Productos activos con stock en tiempo real. Reserva y finaliza por WhatsApp.
        </p>
      </header>

      <section id="statusBar" class="mb-4 hidden rounded-lg bg-amber-100 p-3 text-sm text-amber-800"></section>

      <section id="whatsappFallback" class="mb-4 hidden rounded-2xl bg-white p-4 shadow-sm">
        <p class="text-sm text-zinc-700">Si no se abrió WhatsApp automáticamente, presiona el botón:</p>
        <a
          id="whatsappLink"
          class="mt-3 inline-flex w-full items-center justify-center rounded-lg bg-emerald-600 px-4 py-3 text-sm font-semibold text-white"
          href="#"
          rel="noopener"
        >
          Abrir WhatsApp
        </a>
      </section>

      <section id="orderPanel" class="mb-4 rounded-2xl bg-white p-4 shadow-sm">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold">Mi pedido</h2>
          <button id="clearOrderBtn" class="text-sm text-zinc-500 underline">Vaciar</button>
        </div>
        <div id="orderItems" class="mt-3 space-y-2 text-sm text-zinc-700"></div>
        <div class="mt-3 flex items-center justify-between border-t border-zinc-200 pt-3">
          <p class="font-semibold">Total: <span id="orderTotal">$ 0</span></p>
          <button id="checkoutBtn" class="rounded-lg bg-black px-4 py-2 text-sm font-medium text-white">
            Finalizar por WhatsApp
          </button>
        </div>
      </section>

      <section id="productsGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"></section>
    </main>

    <div id="reserveModal" class="fixed inset-0 z-20 hidden items-center justify-center bg-black/60 p-4">
      <div class="w-full max-w-md rounded-2xl bg-white p-5 shadow-lg">
        <h2 class="text-lg font-semibold">Finalizar pedido</h2>
        <p id="modalProductInfo" class="mt-1 text-sm text-zinc-600">Confirma tus datos para enviar el resumen por WhatsApp.</p>
        <form id="reserveForm" class="mt-4 space-y-3">
          <input id="customerName" class="w-full rounded-lg border border-zinc-300 p-2.5" placeholder="Tu nombre" required />
          <input id="address" class="w-full rounded-lg border border-zinc-300 p-2.5" placeholder="Dirección de envío" required />
          <div class="flex gap-2">
            <button type="button" id="cancelBtn" class="w-1/2 rounded-lg border border-zinc-300 py-2 font-medium">Cancelar</button>
            <button type="submit" class="w-1/2 rounded-lg bg-black py-2 font-medium text-white">Confirmar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/app.js" defer></script>
  </body>
  </html>
